<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://eu-images.contentstack.com/v3/assets/blt69509c9116440be8/blt8ffb90a2f64bacfa/6776f4544b281ca5e2bc465a/cybersecurity_NicoElNino-AlamyStockPhoto.jpg?width=744&auto=webp&quality=80&format=jpg&disable=upscale') center/cover no-repeat fixed;
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h2 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 2em;
            margin-top: 50px;
        }
        form {
            margin-top: 30px;
        }
        input {
            margin: 10px;
            padding: 10px;
            width: 250px;
            border: none;
            border-radius: 5px;
        }
        button {
            margin: 10px;
            padding: 10px 30px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background: darkblue;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

    <h2>Register</h2>

    <form>
        <input type="text" placeholder="Full Name" required><br>
        <input type="email" placeholder="Email" required><br>
        <input type="password" placeholder="Password" required><br>
        <button type="submit">Register</button>
    </form>

    <br>
    <a href="index.html">Back to Home</a>

</body>
